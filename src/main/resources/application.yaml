spring:
  application:
    name: trade-service
  main:
    banner-mode: off
    log-startup: true
    lazy-initialization: true

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}

  devtools:
    restart:
      enabled: false

  # =========================
  # DATASOURCE
  # =========================
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

    hikari:
      maximum-pool-size: ${SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE:10}
      minimum-idle: ${SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE:2}
      connection-timeout: ${SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT:30000}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    properties:
      hibernate:
        format_sql: true

  # =========================
  # REDIS
  # =========================
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  # =========================
  # MAIL
  # =========================
  mail:
    host: ${SPRING_MAIL_HOST}
    port: ${SPRING_MAIL_PORT}
    protocol: smtp

# =========================
# SERVER
# =========================
server:
  port: ${SERVICE_PORT}

# =========================
# ACTUATOR
# =========================
management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    root: INFO
    org.springframework: INFO
    org.hibernate: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

kafka:
  bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
  schema-registry-url: ${KAFKA_SCHEMA_REGISTRY_URL:http://schema-registry:8081}
  consumer:
    group-id: ${KAFKA_CONSUMER_GROUP_ID:trade-allocation-service}
  topics:
    trades-executed: ${KAFKA_TOPIC_TRADES_EXECUTED:trades.executed}
    trades-allocated: ${KAFKA_TOPIC_TRADES_ALLOCATED:trades.allocated}
    trades-allocation-failed: ${KAFKA_TOPIC_TRADES_ALLOCATION_FAILED:trades.allocation.failed}
    trades-executed-dlq: ${KAFKA_TOPIC_TRADES_EXECUTED_DLQ:trades.executed.dlq}
    trades-executed-dlq-malformed: ${KAFKA_TOPIC_TRADES_EXECUTED_DLQ_MALFORMED:trades.executed.dlq.malformed}

outbox:
  poll:
    interval-ms: ${OUTBOX_POLL_INTERVAL_MS:2000}

service:
  query:
    page: 0
    size: 25

reference:
  organizations:
    path: ${REFERENCE_ORGANIZATIONS_PATH:classpath:reference/organizations.json}
